name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clarity
          POSTGRES_PASSWORD: clarity_dev
          POSTGRES_DB: clarity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clarity -d clarity_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://clarity:clarity_dev@localhost:5432/clarity_test
      TEST_DATABASE_URL: postgresql+asyncpg://clarity:clarity_dev@localhost:5432/clarity_test
      SECRET_KEY: ci-test-secret-key
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

