services:
  db:
    image: postgres:16-alpine
    container_name: clarity-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clarity
      POSTGRES_PASSWORD: clarity_dev
      POSTGRES_DB: clarity
    ports:
      - "5432:5432"
    volumes:
      - clarity_pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clarity -d clarity"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clarity-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clarity:clarity_dev@db:5432/clarity
      APP_ENV: development
      SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  clarity_pgdata:
